services:
  bi-backend:
    build: 
      context: ./bi-backend
    ports:
      - "5001:5001" # Map port [host]:[container]
    env_file:
      - .env        # Đọc trực tiếp từ file .env ở thư mục gốc
    restart: unless-stopped

  bi-frontend:
    build: 
      context: ./bi-frontend
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    env_file:
      - .env        # Frontend cũng dùng chung file .env này
    environment:
      - PORT=3000
    depends_on:
      - bi-backend     # Đảm bảo backend chạy lên trước frontend
    restart: unless-stopped